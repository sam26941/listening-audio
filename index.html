  <audio id="player" controls preload="none"></audio>
  <div id="status"></div>
  <script>
    const basePath = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1);
    const links = ["question_1.mp3", "question_2.mp3", "question_3.mp3", "question_4.mp3", "question_5.mp3", "question_6.mp3", "question_7.mp3", "question_8.mp3", "question_9.mp3", "question_10.mp3", "question_11.mp3", "question_12.mp3", "question_13.mp3", "question_14.mp3", "question_15.mp3", "question_16.mp3", "question_17.mp3", "question_18.mp3", "question_19.mp3", "question_20.mp3", "question_21.mp3", "question_22.mp3", "question_23.mp3", "question_24.mp3", "question_25.mp3", "question_26.mp3", "question_27.mp3", "question_28.mp3", "question_29.mp3", "question_30.mp3"];
    const player = document.getElementById("player");
    const status = document.getElementById("status");
    function playAudio(index) {
      const src = links[index - 1];
      if (!src) {
        status.textContent = "Audio path is not available.";
        return;
      }
      status.textContent = "";
      player.src = basePath + src;
      player.load();
      player.play().catch(function(err) {
        status.textContent = "Playback blocked or failed: " + err.message;
        console.error(err);
      });
    }
  </script>
